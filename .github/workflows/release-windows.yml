name: Release - Windows Installer

# Builds Clinikore-Setup-<version>.exe on a Windows runner and attaches it
# to a GitHub Release.
#
# Trigger:
#   - Push a tag matching `v*` (e.g. git tag v0.1.0 && git push --tags)
#   - Or run manually from the Actions tab via workflow_dispatch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / commit to build"
        required: true
        default: "main"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Run PyInstaller
        shell: cmd
        run: pyinstaller --clean --noconfirm installer\clinikore.spec

      - name: Run Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\installer.iss

      - name: Find built installer
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\installer\*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "Setup.exe not produced"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"    >> $env:GITHUB_OUTPUT
          Write-Host "Found $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}
          retention-days: 30

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
