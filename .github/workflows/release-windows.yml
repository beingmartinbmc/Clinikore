name: Release - Windows Installer

# Builds Clinikore-Setup-<version>.exe on a Windows runner and attaches it
# to a GitHub Release.
#
# Trigger:
#   - Push a tag matching `v*` (e.g. git tag v0.1.0 && git push --tags)
#   - Or run manually from the Actions tab via workflow_dispatch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1 → creates tag v0.1.1)"
        required: true
        default: "0.1.0"
      ref:
        description: "Branch / commit to build from"
        required: false
        default: "main"

permissions:
  contents: write   # needed to create GitHub Releases & tags

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Resolve the version + tag once, drive the whole build from it.
      #   - Tag push (v0.1.0)  -> version="0.1.0"   tag="v0.1.0"
      #   - Manual dispatch    -> version=<input>   tag="v<input>"
      # ------------------------------------------------------------------
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "::notice::Building Clinikore ${VERSION} (tag ${TAG})"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Run PyInstaller
        shell: cmd
        run: pyinstaller --clean --noconfirm installer\clinikore.spec

      # /DAppVersion overrides the #define in installer.iss, so the output
      # file name (and everything Windows shows in "Apps & features") stays
      # in lockstep with the git tag without editing the .iss.
      - name: Run Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.version.outputs.version }} installer\installer.iss

      - name: Find built installer
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\installer\*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "Setup.exe not produced"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"    >> $env:GITHUB_OUTPUT
          Write-Host "Found $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}
          retention-days: 30

      # Always create / update a GitHub Release. softprops/action-gh-release
      # will create the tag if it doesn't already exist — so manual dispatch
      # runs also produce a real Release, not just an Actions artifact.
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Clinikore ${{ steps.version.outputs.version }}"
          files: ${{ steps.find.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
