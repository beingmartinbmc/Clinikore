name: Release - Windows Installer

# Builds modern x64/x86 installers plus Python 3.7 legacy Windows 7 installers.
# The legacy artifacts avoid Python 3.8's DLL loader behavior and Pydantic v2's
# Rust-backed pydantic-core on base/unpatched Windows 7.
#
# Trigger:
#   - Push a tag matching `v*` (e.g. git tag v0.1.0 && git push --tags)
#   - Or run manually from the Actions tab via workflow_dispatch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1 → creates tag v0.1.1)"
        required: true
        default: "0.1.0"
      ref:
        description: "Branch / commit to build from"
        required: false
        default: "main"

permissions:
  contents: write   # needed to create GitHub Releases & tags

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      # ------------------------------------------------------------------
      # Resolve the version + tag once, drive the whole build from it.
      #   - Tag push (v0.1.0)  -> version="0.1.0"   tag="v0.1.0"
      #   - Manual dispatch    -> version=<input>   tag="v<input>"
      # ------------------------------------------------------------------
      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${INPUT_VERSION}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "::notice::Building Clinikore ${VERSION} (tag ${TAG})"

  build-installer:
    name: Build Windows installer (${{ matrix.suffix }})
    runs-on: windows-latest
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.8.10"
            python_arch: x64
            app_arch: x64
            suffix: win-x64
            requirements: requirements.txt
            extra_packages: pyinstaller
          - python_version: "3.8.10"
            python_arch: x86
            app_arch: x86
            suffix: win-x86
            requirements: requirements.txt
            extra_packages: pyinstaller
          - python_version: "3.7.9"
            python_arch: x64
            app_arch: x64
            suffix: win7-legacy-x64
            requirements: requirements-win7-legacy.txt
            extra_packages: ""
          - python_version: "3.7.9"
            python_arch: x86
            app_arch: x86
            suffix: win7-legacy-x86
            requirements: requirements-win7-legacy.txt
            extra_packages: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          # Build once per Python version and CPU architecture because
          # PyInstaller embeds the active interpreter into the app bundle.
          python-version: ${{ matrix.python_version }}
          architecture: ${{ matrix.python_arch }}
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }} ${{ matrix.extra_packages }}

      - name: Validate legacy backend on Python 3.7
        if: startsWith(matrix.suffix, 'win7-legacy')
        run: |
          python -m compileall -q backend launcher.py
          python -c "from backend.main import app; print('FastAPI app:', app.title, app.version)"
          pytest -q

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Run PyInstaller
        shell: cmd
        env:
          CLINIKORE_BUILD_SUFFIX: ${{ matrix.suffix }}
        run: pyinstaller --clean --noconfirm installer\clinikore.spec

      # /DAppVersion overrides the #define in installer.iss, so the output
      # file name (and everything Windows shows in "Apps & features") stays
      # in lockstep with the git tag without editing the .iss.
      - name: Run Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ needs.resolve-version.outputs.version }} ^
            /DAppArch=${{ matrix.app_arch }} ^
            /DOutputSuffix=${{ matrix.suffix }} ^
            /DSourceDir=Clinikore-${{ matrix.suffix }} ^
            installer\installer.iss

      - name: Find built installer
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\installer\*-${{ matrix.suffix }}.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "Setup.exe not produced"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"    >> $env:GITHUB_OUTPUT
          Write-Host "Found $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}
          retention-days: 30

  publish-release:
    name: Publish Windows release
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-installer
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # Always create / update a GitHub Release. softprops/action-gh-release
      # will create the tag if it doesn't already exist — so manual dispatch
      # runs also produce a real Release, not just an Actions artifact.
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: "Clinikore ${{ needs.resolve-version.outputs.version }}"
          files: release-assets/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
